<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>portfolio local</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: "Instrument Serif", serif;
    }
    .frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }
    .fallback {
      position: fixed;
      left: 1rem;
      bottom: 1rem;
      z-index: 2;
      color: rgba(255, 255, 255, 0.78);
      font-size: 0.9rem;
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.35);
      padding-bottom: 0.1rem;
      background: rgba(0, 0, 0, 0.35);
    }
    .fallback:hover,
    .fallback:focus-visible {
      color: #fff;
      outline: none;
    }
    .fallback code {
      color: rgba(255, 255, 255, 0.7);
    }
  </style>
</head>
<body>
  <iframe class="frame" src="http://localhost:3000" title="local portfolio"></iframe>
  <a class="fallback" href="http://localhost:3000">open <code>localhost:3000</code></a>
</body>
</html>
