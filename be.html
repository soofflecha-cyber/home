<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BE</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 35%, rgba(255, 255, 255, 0.08), transparent 24%),
        linear-gradient(to bottom, #060606 0%, #000 100%);
      color: rgba(255, 255, 255, 0.92);
      font-family: "Instrument Serif", serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    main {
      text-align: center;
    }

    h1 {
      margin: 0 0 0.6rem;
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 400;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0 0 1.4rem;
      color: rgba(255, 255, 255, 0.62);
      font-size: clamp(1rem, 2vw, 1.25rem);
    }

    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.4);
      padding-bottom: 0.1rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>BE</h1>
    <p>This path is now connected.</p>
    <a href="./index.html">return</a>
  </main>
</body>
</html>
